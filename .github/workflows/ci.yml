name: Campus Companion UI & API CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: './client/package-lock.json'
        
    - name: Install Dependencies
      run: npm ci
      working-directory: ./client
      
    - name: Vite Production Build
      run: npm run build
      working-directory: ./client

  verify-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: './server/package-lock.json'
        
    - name: Install Dependencies
      run: npm ci
      working-directory: ./server
      
    # Optionally, we can run Jest tests here once unit tests are populated
    # - name: Run Unit Tests
    #   run: npm run test
    #   working-directory: ./server
